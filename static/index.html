<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartoony Downloader Pro</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/static/favicon.png" />
  </head>
  <body>
      <div class="mesh-bg-orb" style="background: #8b5cf6; top: 40%; left: 30%; animation: floatOrb 35s ease-in-out infinite alternate; filter: blur(120px); opacity: 0.2;"></div>
    <div class="ambient-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="container">
      <header class="glass-nav">
        <div class="logo-row">
          <img src="/static/logo.webp" alt="Cartoony" class="logo" />
        </div>
        <p>
          Cartoony Bulk Video Downloader <span class="version-tag">v1.0.0</span>
        </p>
      </header>

      <main>
        <div class="card glass">
          <!-- Season ID + Fetch -->
          <div class="row row-fetch">
            <div class="input-group">
              <label>Season ID</label>
              <input type="number" id="seasonId" placeholder="e.g. 570" />
            </div>
            <div class="input-group fetch-group">
              <label>&nbsp;</label>
              <button id="fetchBtn" class="fetch-btn">🔍 Fetch Episodes</button>
            </div>
          </div>

          <!-- Episode checklist (hidden until fetch) -->
          <div
            id="episodeSection"
            class="episode-section"
            style="display: none"
          >
            <div class="episode-header">
              <span id="episodeCount">0 episodes found</span>
              <div class="episode-actions">
                <button id="selectAll" class="mini-btn">Select All</button>
                <button id="deselectAll" class="mini-btn">Deselect All</button>
              </div>
            </div>
            <div id="episodeList" class="episode-list"></div>
          </div>

          <!-- Settings row -->
          <div class="row row-path">
            <div class="input-group">
              <label>Concurrent Tabs</label>
              <input type="number" id="tabCount" value="5" min="1" max="20" />
            </div>
            <div class="input-group">
              <label>Download Path</label>
              <div class="path-row">
                <input
                  type="text"
                  id="downloadPath"
                  placeholder="D:\Downloads\Detective Conan"
                />
                <button
                  type="button"
                  id="browseBtn"
                  class="browse-btn"
                  title="Browse folder"
                >
                  📁
                </button>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button id="startBtn" class="primary-btn" disabled>
              Start Automation
            </button>
            <button id="cancelBtn" class="cancel-btn" style="display: none">
              Cancel
            </button>
          </div>
        </div>

        <div class="card glass logs-card">
          <h3>Live Progress</h3>
          <div id="logs" class="logs-container">
            <div class="log-entry system">
              System ready. Fetch episodes to begin...
            </div>
          </div>
        </div>
      </main>
      <footer>
        <p>
          Built with Playwright & FastAPI •
          <a
            href="https://github.com/kalidahmdev/cartoony-downloader"
            target="_blank"
            >View on GitHub</a
          >
        </p>
      </footer>
    </div>

    <!-- Cancel confirmation modal -->
    <div id="confirmModal" class="modal-overlay" style="display: none">
      <div class="modal glass">
        <h3>Cancel Downloads?</h3>
        <p>
          This will immediately close all browser tabs and stop all downloads.
        </p>
        <div class="modal-btns">
          <button id="confirmYes" class="cancel-btn">Yes, Cancel</button>
          <button id="confirmNo" class="primary-btn">Keep Running</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
